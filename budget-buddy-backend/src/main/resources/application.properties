# Basic application settings
spring.application.name=budget-buddy-backend
server.port=${PORT:8081}
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Database Configuration is handled by com.budgetbuddy.config.DatabaseConfig
# Locally: uses embedded H2 | Railway: auto-detects DATABASE_URL for PostgreSQL

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Secret config (Use a strong long string in prod)
jwt.secret=${JWT_SECRET:LocalDevelopmentSecretKeyThatIsAtLeast32CharsLong}
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:WARN}
