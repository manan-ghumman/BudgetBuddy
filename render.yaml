services:
  # Backend: Spring Boot Web Service
  - type: web
    name: budget-buddy-backend
    runtime: docker
    dockerContext: budget-buddy-backend
    dockerfilePath: budget-buddy-backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: budget-buddy-db
          property: connectionString
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: budget-buddy-frontend
          # Access the frontend's auto-generated external URL
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend: React Static Site
  - type: web
    name: budget-buddy-frontend
    runtime: static
    buildCommand: cd budget-buddy-frontend && npm install && npm run build
    staticPublishPath: budget-buddy-frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: budget-buddy-backend
          # Access the backend's auto-generated external URL
          envVarKey: RENDER_EXTERNAL_URL
        suffix: /api

# Database: PostgreSQL
databases:
  - name: budget-buddy-db
    plan: free
